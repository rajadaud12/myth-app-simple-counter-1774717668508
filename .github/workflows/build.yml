name: MYTH Build System

on:
  push:
    branches: [main, 'project-*']
  workflow_dispatch:
    inputs:
      build_type:
        description: "apk or web"
        required: true
        default: "apk"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Cache Gradle
        if: github.event.inputs.build_type == 'apk' || github.event_name == 'push'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.0"
          channel: "stable"
          cache: true

      - name: Initialize Project
        run: |
          mkdir -p .backup
          cp -r lib .backup/ || true
          cp pubspec.yaml .backup/ || true
          
          # Target only the platform needed for speed
          TARGET="${{ github.event.inputs.build_type }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          
          PLATFORM="web"
          if [ "$TARGET" == "apk" ]; then PLATFORM="android"; fi
          
          flutter create . --platforms=$PLATFORM --project-name=app --overwrite
          
          cp -r .backup/lib . || true
          cp .backup/pubspec.yaml . || true
          flutter pub get

      - name: Build
        run: |
          TARGET="${{ github.event.inputs.build_type }}"
          if [ -z "$TARGET" ]; then TARGET="web"; fi
          
          if [ "$TARGET" == "web" ]; then
            # Fix base-href for subdirectory hosting
            flutter build web --release --base-href "/${{ github.event.repository.name }}/previews/${{ github.ref_name }}/"
            echo "" | base64 -d > capture_script.html
            node -e "const fs = require('fs'); const path = 'build/web/index.html'; let html = fs.readFileSync(path, 'utf8'); const script = fs.readFileSync('capture_script.html', 'utf8'); html = html.replace('</body>', script + '</body>'); fs.writeFileSync(path, html);"
          else
            flutter build apk --release
          fi
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          if-no-files-found: ignore
          path: |
            build/web
            build/app/outputs/flutter-apk/app-release.apk

      - name: Deploy to GitHub Preview
        if: github.event.inputs.build_type == 'web' || github.event_name == 'push'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use a temporary folder to manage gh-pages
          git clone --depth 1 --branch gh-pages https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git gh-pages-dir || mkdir gh-pages-dir
          
          cd gh-pages-dir
          if [ ! -d ".git" ]; then
            git init
            git checkout -b gh-pages
            git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          fi
          
          # Create subdirectory for this project branch
          mkdir -p previews/${{ github.ref_name }}
          rm -rf previews/${{ github.ref_name }}/*
          cp -r ../build/web/* previews/${{ github.ref_name }}/
          
          git add .
          git commit -m "Deploy preview for ${{ github.ref_name }}" || echo "No changes to commit"
          git push origin gh-pages